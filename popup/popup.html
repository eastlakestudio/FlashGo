<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MiaoBuy 抢购配置</title>
  <link rel="stylesheet" href="popup.css">
  <style>
    .step-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .step-item input {
      flex: 1;
      min-width: 0;
    }
    .step-item button {
      margin: 0;
      padding: 6px 10px;
    }
    .btn-danger {
      background-color: #ef4444;
    }
    .btn-danger:hover {
      background-color: #dc2626;
    }
    .btn-secondary {
      background-color: #6b7280;
    }
    .btn-secondary:hover {
      background-color: #4b5563;
    }
    #stepsContainer {
      max-height: 150px;
      overflow-y: auto;
      border: 1px solid #d1d5db;
      padding: 8px;
      border-radius: 6px;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>抢购助手配置</h2>
    <div class="form-group">
      <label for="targetUrl">目标网址：</label>
      <input type="url" id="targetUrl" value="https://bigmodel.cn/glm-coding?plantype=personal" required>
    </div>
    
    <div class="form-group">
      <label>操作步骤序列：</label>
      <div id="stepsContainer">
        <!-- Steps injected here -->
      </div>
      <div style="display: flex; gap: 8px; margin-top: 4px;">
        <button id="addStepBtn" type="button" style="flex: 1; margin: 0; background-color: #10b981;">+ 在页面点选添加</button>
        <button id="verifyBtn" type="button" style="margin: 0; padding: 0 12px; background-color: #f59e0b;">验证序列</button>
      </div>
    </div>

    <div class="form-group">
      <label for="targetTime">目标时间：</label>
      <input type="datetime-local" id="targetTime" required>
    </div>
    <div class="form-group">
      <label for="advanceSeconds">提前打开时间 (秒)：</label>
      <input type="number" id="advanceSeconds" value="5" min="1" max="60" required>
    </div>
    <div class="form-group">
      <label for="delayMs">步骤间隔延迟 (毫秒)：</label>
      <input type="number" id="delayMs" value="100" min="0" max="5000" required>
    </div>
    <button id="saveBtn">保存抢购任务</button>
    <div id="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
