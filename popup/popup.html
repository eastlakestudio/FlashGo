<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MiaoBuy 抢购配置</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h2>抢购助手配置</h2>
    <div class="form-group">
      <label for="targetUrl">目标网址：</label>
      <input type="url" id="targetUrl" value="https://bigmodel.cn/glm-coding?plantype=personal" required>
    </div>
    <div class="form-group">
      <label for="targetSelector">按钮选择器 (CSS)：</label>
      <input type="text" id="targetSelector" value=".buy-btn" placeholder="例如：.btn-primary" required>
    </div>
    <div class="form-group">
      <label for="targetTime">目标时间：</label>
      <input type="datetime-local" id="targetTime" required>
    </div>
    <div class="form-group">
      <label for="advanceSeconds">提前打开时间 (秒)：</label>
      <input type="number" id="advanceSeconds" value="5" min="1" max="60" required>
    </div>
    <button id="saveBtn">保存抢购任务</button>
    <div id="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
