<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MiaoBuy 抢购任务管理</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div class="container" id="listView">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h2>抢购任务列表</h2>
      <button id="createNewBtn" class="btn-primary" style="margin: 0; padding: 4px 12px; font-size: 12px;">新建任务</button>
    </div>
    <div id="tasksContainer" class="tasks-container">
      <!-- Task cards injected here -->
    </div>
  </div>

  <div class="container" id="editorView" style="display: none;">
    <div style="display: flex; align-items: center; gap: 8px;">
      <button id="backToListBtn" class="btn-secondary" style="margin:0; padding: 4px 8px; font-size: 12px;">返回</button>
      <h2 style="margin:0;">编辑任务</h2>
    </div>
    <hr style="border: 0; border-top: 1px solid #e5e7eb; margin: 8px 0;">
    
    <div class="form-group">
      <label for="targetUrl">目标网址：</label>
      <input type="url" id="targetUrl" placeholder="例如：https://bigmodel.cn/..." required>
    </div>
    
    <div class="form-group">
      <label>操作步骤序列：</label>
      <div id="stepsContainer">
        <!-- Steps injected here -->
      </div>
      <div style="display: flex; gap: 8px; margin-top: 4px;">
        <button id="addStepBtn" type="button" class="btn-success" style="flex: 1; margin: 0;">+ 在页面点选添加</button>
        <button id="verifyBtn" type="button" class="btn-warning" style="margin: 0; padding: 0 12px;">验证序列</button>
      </div>
    </div>

    <div class="form-group">
      <label for="targetTime">目标时间：</label>
      <input type="datetime-local" id="targetTime">
      <small style="color:#6b7280; font-size: 11px;">暂存任务可不填</small>
    </div>
    
    <div class="form-group row-group">
      <div style="flex:1;">
        <label for="advanceSeconds">提前打开页(秒)：</label>
        <input type="number" id="advanceSeconds" value="5" min="1" max="60">
      </div>
      <div style="flex:1;">
        <label for="delayMs">步骤间隔(毫秒)：</label>
        <input type="number" id="delayMs" value="100" min="0" max="5000">
      </div>
    </div>

    <hr style="border: 0; border-top: 1px dashed #d1d5db; margin: 8px 0;">
    
    <div class="form-group row-group">
      <div style="flex:1;">
        <label for="maxRetries">最大重试次数：</label>
        <input type="number" id="maxRetries" value="0" min="0" max="100">
      </div>
      <div style="flex:1;">
        <label for="retryIntervalMs">重试间隔(毫秒)：</label>
        <input type="number" id="retryIntervalMs" value="1000" min="0" max="10000">
      </div>
    </div>
    <div class="form-group checkbox-group">
      <input type="checkbox" id="reloadOnRetry">
      <label for="reloadOnRetry" style="margin:0;">重试前刷新网页</label>
    </div>

    <div style="font-size: 11px; color: #10b981; margin-top: 4px; padding: 4px; background: #d1fae5; border-radius: 4px;">
      ✨ 智能判定已开启：结束后将使用 Chrome 端侧 AI 判定是否抢购成功，失败将自动重试，成功则弹出桌面通知！
    </div>

    <div style="display: flex; gap: 8px; margin-top: 12px;">
      <button id="saveDraftBtn" class="btn-secondary" style="flex: 1;">保存暂存</button>
      <button id="scheduleBtn" class="btn-primary" style="flex: 1;">调度激活</button>
    </div>
    <div id="status"></div>
  </div>
  <script src="panel.js"></script>
</body>
</html>
