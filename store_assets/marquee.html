<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>FlashGo Marquee</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background-color: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  
  .marquee-container {
    width: 1400px;
    height: 560px;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    position: relative;
    overflow: hidden;
    display: flex;
    color: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  /* Abstract background elements */
  .bg-circle {
    position: absolute;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.03);
  }
  .circle1 { width: 800px; height: 800px; top: -400px; left: -200px; }
  .circle2 { width: 600px; height: 600px; bottom: -200px; right: -100px; }

  .content-left {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-left: 100px;
    z-index: 2;
  }

  .content-right {
    flex: 1.2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 80px 60px 0;
    z-index: 2;
  }

  .logo-container {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 20px;
  }

  .logo-img {
    width: 128px;
    height: 128px;
    background: white;
    border-radius: 24px;
    padding: 10px;
    box-shadow: 0 8px 16px rgba(0,0,0,0.2);
  }

  .title {
    font-size: 72px;
    font-weight: 800;
    margin: 0;
    letter-spacing: 2px;
    text-shadow: 0 4px 12px rgba(0,0,0,0.3);
  }

  .subtitle {
    font-size: 32px;
    font-weight: 400;
    margin-top: 16px;
    color: #a8c0ff;
    line-height: 1.4;
  }

  .features-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
  }

  .feature-card {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 16px;
    padding: 24px;
    transition: transform 0.3s ease;
  }

  .feature-icon {
    font-size: 36px;
    margin-bottom: 12px;
  }

  .feature-title {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 8px;
    color: #fff;
  }

  .feature-desc {
    font-size: 16px;
    color: #e0e0e0;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="marquee-container" id="capture-area">
  <div class="bg-circle circle1"></div>
  <div class="bg-circle circle2"></div>
  
  <div class="content-left">
    <div class="logo-container">
      <!-- 这里的路径假定 HTML 和 icon 都在 store_assets 的上一层，如果是放在 store_assets 中需要相对路径 -->
      <img src="../icons/icon128.png" alt="FlashGo Logo" class="logo-img">
      <h1 class="title">FlashGo</h1>
    </div>
    <div class="subtitle">
      强大的浏览器自动化扩展<br>
      让抢购与打卡更简单
    </div>
  </div>

  <div class="content-right">
    <div class="features-grid">
      
      <div class="feature-card">
        <div class="feature-icon">🖱️</div>
        <div class="feature-title">可视化录制</div>
        <div class="feature-desc">无需写代码，在网页上简单点击即可生成复杂的自动化点击序列。</div>
      </div>

      <div class="feature-card">
        <div class="feature-icon">⏰</div>
        <div class="feature-title">灵活定时任务</div>
        <div class="feature-desc">精确到秒的单次执行，或自定义每周循环，时间一到自动触发。</div>
      </div>

      <div class="feature-card">
        <div class="feature-icon">🔄</div>
        <div class="feature-title">智能重试机制</div>
        <div class="feature-desc">自动等待页面元素加载，失败时支持自动刷新，大幅提高成功率。</div>
      </div>

      <div class="feature-card">
        <div class="feature-icon">🛡️</div>
        <div class="feature-title">绝对隐私安全</div>
        <div class="feature-desc">所有任务数据仅保存在本地浏览器中，绝不上传任何第三方服务器。</div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
