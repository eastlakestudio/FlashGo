<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>FlashGo Small Promo</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background-color: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  
  .promo-container {
    width: 440px;
    height: 280px;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
  }

  /* Abstract background elements */
  .bg-circle {
    position: absolute;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.04);
  }
  .circle1 { width: 300px; height: 300px; top: -100px; left: -100px; }
  .circle2 { width: 200px; height: 200px; bottom: -80px; right: -50px; }

  .logo-img {
    width: 80px;
    height: 80px;
    background: white;
    border-radius: 18px;
    padding: 8px;
    box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    margin-bottom: 16px;
    z-index: 2;
  }

  .title {
    font-size: 42px;
    font-weight: 800;
    margin: 0;
    letter-spacing: 1px;
    text-shadow: 0 4px 12px rgba(0,0,0,0.3);
    z-index: 2;
  }

  .subtitle {
    font-size: 16px;
    font-weight: 400;
    margin-top: 8px;
    color: #a8c0ff;
    z-index: 2;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="promo-container" id="capture-area">
  <div class="bg-circle circle1"></div>
  <div class="bg-circle circle2"></div>
  
  <img src="../icons/icon128.png" alt="FlashGo Logo" class="logo-img">
  <h1 class="title">FlashGo</h1>
  <div class="subtitle">浏览器自动化扩展</div>
</div>

</body>
</html>
